version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: ecom-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecom
      MYSQL_USER: ecom
      MYSQL_PASSWORD: ecom
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  zookeeper:
    image: bitnami/zookeeper:3.9
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:3
    container_name: ecom-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"

  prometheus:
    image: prom/prometheus:latest
    container_name: ecom-prometheus
    restart: unless-stopped
    volumes:
      - ./platform/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: ecom-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:alpine
    container_name: ecom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./platform/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/storefront-react/build:/usr/share/nginx/html:ro
    depends_on:
      - catalog-service
      - inventory-service
      - promise-service
      - order-service

  catalog-service:
    build:
      context: services/catalog-service
    image: ecom/catalog-service:latest
    container_name: catalog-service
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - mysql

  inventory-service:
    build:
      context: services/inventory-service
    image: ecom/inventory-service:latest
    container_name: inventory-service
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - mysql
      - redis

  promise-service:
    build:
      context: services/promise-service
    image: ecom/promise-service:latest
    container_name: promise-service
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - inventory-service
      - redis

  order-service:
    build:
      context: services/order-service
    image: ecom/order-service:latest
    container_name: order-service
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - mysql
      - kafka
      - promise-service
      - payment-service

  payment-service:
    build:
      context: services/payment-service
    image: ecom/payment-service:latest
    container_name: payment-service
    environment:
      SPRING_PROFILES_ACTIVE: local

  api-gateway:
    build:
      context: services/api-gateway
    image: ecom/api-gateway:latest
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      - catalog-service
      - inventory-service
      - promise-service
      - order-service
      - payment-service

volumes:
  mysql_data:
