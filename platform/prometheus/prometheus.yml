global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'catalog-service:8080'
          - 'inventory-service:8080'
          - 'promise-service:8080'
          - 'order-service:8080'
          - 'payment-service:8080'
  - job_name: 'nginx'
    static_configs:
      - targets:
          - 'nginx:9113'
